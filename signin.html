<!DOCTYPE html>
<html>
<head>
  <title>Hugo SMP Link</title>
</head>
<body>

  <h1>Account verbinden</h1>

  <button onclick="createCode()">Minecraft verbinden</button>

  <p id="output"></p>

  <script>
    async function createCode() {
      const res = await fetch("https://DEIN-BACKEND.up.railway.app/create-code");
      const data = await res.json();

      document.getElementById("output").innerText =
        "Gib im Spiel ein: /link " + data.code;
    }
  </script>

</body>
</html>
