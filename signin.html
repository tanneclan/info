<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanneclan Login</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@700;800;900&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --g1: #060f06;
  --g4: #1a5c22;
  --g6: #2da83c;
  --g7: #3fd155;
  --g8: #7ee88f;
  --g9: #c2f5c8;
}

body {
  font-family: 'Exo 2', sans-serif;
  background: var(--g1);
  color: white;
  min-height: 100vh;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 85%, rgba(20,66,26,0.4), transparent 60%),
    radial-gradient(ellipse 50% 70% at 85% 15%, rgba(45,168,60,0.25), transparent 60%);
}

/* BACK BUTTON */
.back-btn {
  position: fixed;
  top: 20px;
  right: 20px;

  width: 44px;
  height: 44px;

  display: flex;
  align-items: center;
  justify-content: center;

  text-decoration: none;

  font-size: 1.4rem;
  font-weight: 900;

  color: var(--g8);

  border-radius: 12px;

  background: rgba(20,66,26,0.4);
  border: 1px solid rgba(63,209,85,0.25);

  backdrop-filter: blur(8px);

  transition: 0.2s;
  z-index: 10;
}

.back-btn:hover {
  transform: translateY(-3px);
  border-color: rgba(63,209,85,0.6);
  box-shadow: 0 0 25px rgba(63,209,85,0.2);
}

/* CENTER BOX */
.wrapper {
  position: relative;
  z-index: 2;

  height: 100vh;

  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box {
  width: 100%;
  max-width: 520px;

  background: rgba(14,44,16,0.55);
  border: 1px solid rgba(63,209,85,0.2);

  border-radius: 22px;

  padding: 3rem;

  backdrop-filter: blur(10px);

  box-shadow: 0 0 45px rgba(63,209,85,0.08);

  transition: transform 0.15s ease;
}

/* TEXT */
.badge {
  display: inline-block;
  font-size: 0.75rem;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--g7);
  border: 1px solid rgba(63,209,85,0.35);
  padding: 0.4rem 1rem;
  border-radius: 999px;
  margin-bottom: 1.5rem;
}

.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4.5rem;
  letter-spacing: 4px;
  background: linear-gradient(160deg,#fff,var(--g8),var(--g6));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 0.5rem;
}

.sub {
  font-size: 0.85rem;
  font-weight: 900;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--g8);
  opacity: 0.6;
  margin-bottom: 2rem;
}

/* INPUT */
.input-label {
  font-size: 0.8rem;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--g8);
  margin-bottom: 0.5rem;
  display: block;
}

.input {
  width: 100%;
  padding: 1rem;
  border-radius: 12px;

  border: 1px solid rgba(63,209,85,0.2);
  background: rgba(20,66,26,0.4);

  color: white;
  font-weight: 800;

  outline: none;
}

.input:focus {
  border-color: rgba(63,209,85,0.6);
}

/* BUTTON */
.btn {
  width: 100%;
  margin-top: 1rem;

  padding: 1rem;

  border: none;
  border-radius: 12px;

  cursor: pointer;

  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;

  color: white;

  background: linear-gradient(135deg,var(--g4),var(--g7));

  transition: 0.2s;
}

.btn:hover {
  transform: translateY(-3px);
}

/* RESULT */
.result {
  margin-top: 1.5rem;
  padding: 1rem;

  background: rgba(20,66,26,0.4);
  border: 1px solid rgba(63,209,85,0.15);
  border-radius: 12px;

  text-align: center;
}

.code {
  font-family: 'Bebas Neue';
  font-size: 3rem;
  letter-spacing: 5px;
}

/* fade */
.hidden { display:none; }
</style>
</head>

<body>

<a class="back-btn" href="index.html">←</a>

<div class="wrapper">

  <div class="login-box">

    <div class="badge">HugoSMP Login</div>

    <div class="title">Tanneclan</div>

    <div class="sub">Minecraft Account verbinden</div>

    <label class="input-label">Minecraft Name</label>

    <input id="mcName" class="input" value="Tanneben">

    <button class="btn" onclick="generateCode()">Code generieren</button>

    <div id="result" class="result hidden">
      <div>Dein Code</div>
      <div class="code" id="code">0000</div>
    </div>

  </div>

</div>

<script>
async function generateCode() {

  const name = document.getElementById("mcName").value;

  const res = await fetch("https://mc-link-backend-production.up.railway.app/create-code", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ name })
  });

  const data = await res.json();

  document.getElementById("result").classList.remove("hidden");
  document.getElementById("code").innerText = data.code;
}

/* 🎯 CURSOR TILT */
const box = document.querySelector(".login-box");

document.addEventListener("mousemove", (e) => {

  const x = (window.innerWidth / 2 - e.clientX) / 30;
  const y = (window.innerHeight / 2 - e.clientY) / 30;

  box.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

document.addEventListener("mouseleave", () => {
  box.style.transform = "rotateY(0deg) rotateX(0deg)";
});
</script>

</body>
</html>
